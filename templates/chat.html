{% extends 'base.html' %}
{% block title %}Chat{% endblock %}
{% block content %}
<div class="topbar">
    <h1>Messagerie</h1>
</div>

<div class="chat-layout card">
    <aside class="chat-contacts">
        <div class="chat-contact active" data-id="" id="chat-contact-salon">
            <span class="chat-contact-icon"><i class="bx bx-group"></i></span>
            <span class="chat-contact-name">Salon commun</span>
        </div>
        <div class="chat-contacts-sep">Messages prives</div>
        <div id="chat-contact-list"></div>
    </aside>

    <section class="chat-main">
        <div class="chat-header">
            <h3 id="chat-title">Salon commun</h3>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form id="chat-form" class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Ecrire un message..." maxlength="2000" autocomplete="off">
            <button type="submit" class="btn btn-sm"><i class="bx bx-send"></i></button>
        </form>
    </section>
</div>

<script>
    window.CURRENT_USER_ID = {{ current_user['id'] }};
</script>
<script src="{{ url_for('static', filename='chat.js') }}"></script>
{% endblock %}
