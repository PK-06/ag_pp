<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - Planning</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark">R</div>
      <div>
        <div class="brand-name" style="color: var(--navy);">Planning</div>
        <div class="brand-sub" style="color: var(--text-muted);">Gestion des rendez-vous</div>
      </div>
    </div>
    <h1>Connexion</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <label>Utilisateur</label>
      <input type="text" name="username" required autofocus>
      <label>Mot de passe</label>
      <input type="password" name="password" required>
      <button type="submit" class="btn" style="width:100%; margin-top: 1.2rem;">Se connecter</button>
    </form>
    <div class="login-help">Acces reserve aux comptes crees par l'administrateur du centre.</div>
  </div>
</div>
</body>
</html>
